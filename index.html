<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3,000 People Said This Quiz Ended in Divorce</title>
<meta name="description" content="Can you and your partner pass the test? Both of you answer. Neither of you peek. See if you're even in the same relationship.">
<meta property="og:title" content="3,000 People Said This Quiz Ended in Divorce">
<meta property="og:description" content="Can you and your partner pass the test?">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0a0a0a; --fg:#f5f0eb; --accent:#c0392b; --accent-hover:#a93226; --muted:#6b6560; --card:#141414; --green:#22c55e; }
  body { background:var(--bg); color:var(--fg); font-family:'Playfair Display',Georgia,serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; opacity:0.03; pointer-events:none; z-index:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
  #app { width:100%; max-width:520px; text-align:center; position:relative; z-index:1; }
  .screen { opacity:0; transform:translateY(12px); transition:opacity 0.35s ease, transform 0.35s ease; }
  .screen.visible { opacity:1; transform:translateY(0); }
  .stat-number { font-size:clamp(64px,15vw,120px); font-weight:900; color:var(--accent); line-height:0.9; letter-spacing:-0.04em; }
  .label-upper { font-size:13px; font-family:'DM Sans',sans-serif; text-transform:uppercase; letter-spacing:0.18em; color:var(--muted); margin-top:12px; margin-bottom:8px; }
  h1 { font-size:clamp(28px,6vw,42px); font-weight:700; line-height:1.15; margin:0 0 16px; font-style:italic; }
  h2 { font-size:28px; font-weight:700; font-style:italic; margin-bottom:8px; }
  .subtitle { font-size:18px; font-family:'DM Sans',sans-serif; color:var(--muted); line-height:1.5; margin-bottom:48px; }
  .body-text { font-size:15px; font-family:'DM Sans',sans-serif; color:var(--muted); line-height:1.5; margin-bottom:32px; }
  .btn { display:block; width:100%; padding:16px 24px; border:1px solid rgba(245,240,235,0.12); border-radius:8px; background:transparent; color:var(--fg); font-size:16px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; text-align:left; margin-bottom:10px; }
  .btn:hover { background:rgba(245,240,235,0.04); border-color:rgba(245,240,235,0.25); }
  .btn.selected { background:var(--accent); border-color:var(--accent); transform:scale(0.98); }
  .btn-accent { display:block; width:100%; padding:18px 24px; border:1px solid var(--accent); border-radius:8px; background:var(--accent); color:var(--fg); font-size:14px; font-family:'DM Sans',sans-serif; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; text-align:center; }
  .btn-accent:hover { background:var(--accent-hover); }
  .btn-outline { display:block; width:100%; padding:18px 24px; border:1px solid rgba(245,240,235,0.12); border-radius:8px; background:transparent; color:var(--fg); font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; letter-spacing:0.03em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; text-align:center; }
  .btn-outline:hover { background:rgba(245,240,235,0.04); }
  .btn-ghost { display:block; width:100%; background:none; border:none; color:var(--muted); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; padding:12px; text-align:center; }
  .btn-ghost:hover { color:var(--fg); }
  .progress-bar { display:flex; gap:4px; margin-bottom:32px; justify-content:center; }
  .progress-pip { width:100%; max-width:28px; height:3px; border-radius:2px; background:rgba(245,240,235,0.12); transition:background 0.3s; }
  .progress-pip.done { background:var(--accent); }
  .progress-pip.current { background:var(--fg); }
  .question-text { font-size:clamp(22px,5vw,28px); font-weight:600; line-height:1.3; margin-bottom:32px; font-style:italic; min-height:72px; }
  .share-box { background:var(--card); border:1px solid rgba(245,240,235,0.12); border-radius:12px; padding:20px; margin-bottom:24px; word-break:break-all; }
  .share-url { font-size:13px; font-family:'DM Mono',monospace; color:var(--muted); line-height:1.6; user-select:all; }
  /* Results */
  .results-container { text-align:center; }
  .tier-name { font-size:clamp(32px,8vw,48px); font-weight:900; font-style:italic; line-height:1.1; margin-bottom:2px; }
  .tier-score { font-size:14px; font-family:'DM Sans',sans-serif; color:var(--muted); margin-bottom:16px; }
  .alignment-grid { display:flex; gap:4px; justify-content:center; margin-bottom:4px; }
  .alignment-dot { width:22px; height:22px; border-radius:3px; }
  .alignment-dot.match { background:var(--green); }
  .alignment-dot.miss { background:rgba(245,240,235,0.08); }
  .grid-legend { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
  .grid-legend-item { display:flex; align-items:center; gap:4px; font-size:10px; font-family:'DM Sans',sans-serif; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
  .grid-legend-dot { width:8px; height:8px; border-radius:2px; }
  .verdict-text { font-size:14px; font-family:'DM Sans',sans-serif; color:var(--fg); line-height:1.6; margin-bottom:24px; max-width:400px; margin-left:auto; margin-right:auto; opacity:0.85; }
  .results-divider { width:32px; height:1px; background:rgba(245,240,235,0.12); margin:0 auto 20px; }
  .cat-label { font-size:11px; font-family:'DM Sans',sans-serif; text-transform:uppercase; letter-spacing:0.2em; color:var(--muted); margin-bottom:12px; text-align:center; }
  .cat-card { background:var(--card); border:1px solid rgba(245,240,235,0.06); border-radius:10px; padding:14px 16px; margin-bottom:8px; text-align:left; }
  .cat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .cat-name { font-size:14px; font-weight:700; font-style:italic; }
  .cat-score { font-size:13px; font-family:'DM Sans',sans-serif; font-weight:700; }
  .cat-bar { width:100%; height:3px; background:rgba(245,240,235,0.06); border-radius:2px; margin-bottom:8px; overflow:hidden; }
  .cat-bar-fill { height:100%; border-radius:2px; }
  .cat-read { font-size:13px; font-family:'DM Sans',sans-serif; color:var(--muted); line-height:1.5; }
  .results-actions { margin-top:24px; }
  .results-actions .btn-accent, .results-actions .btn-outline { margin-bottom:8px; }
  #results-canvas { display:none; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>
<div id="app"></div>
<canvas id="results-canvas"></canvas>
<script>
const QUESTIONS = [
  {id:1, question:"Someone offers your partner $3 million, but they have to live with their most toxic ex for 3 years first. Are they taking the deal?", options:["Absolutely, we'd survive it","They'd seriously consider it","No chance, they wouldn't risk us","They don't have a toxic ex (sure)"], category:"trust"},
  {id:2, question:"If you could read through your partner's entire text history right now without them knowing, do you think you'd find something that starts a fight?", options:["No, they're an open book","Maybe something mildly annoying","There's definitely a conversation I wouldn't love","I'd rather not find out"], category:"trust"},
  {id:3, question:"The zombie apocalypse is here. Is your partner an asset or a liability?", options:["Full asset. I'd be dead without them.","Asset, but I'm carrying the team","Liability, but a lovable one","I'm not sure we'd stick together"], category:"perception"},
  {id:4, question:"If you disappeared under mysterious circumstances and were presumed dead, how long before your partner would download a dating app?", options:["At least a year. They'd be wrecked.","6 months, grieving but moving on","3 months tops","The apps are already on their phone"], category:"future"},
  {id:5, question:"A scientifically perfect algorithm says it's found your actual, 100% compatible soulmate, and it's not your partner. What do you do?", options:["Ignore it completely, I chose who I chose","Be curious but never act on it","Look them up, just to see","Start questioning everything"], category:"trust"},
  {id:6, question:"Your partner wins $100 million in the lottery tomorrow. How much do they give you?", options:["All of it, what's theirs is ours","A generous split, but they keep more","They'd 'handle the finances' suspiciously","I'd have to ask for it"], category:"trust"},
  {id:7, question:"You could secretly watch a 24/7 livestream of your partner for a week without them knowing. Are you watching?", options:["No, that's unhinged","Maybe a peek out of curiosity","I'd check in a few times, yeah","I'd have it on like background TV"], category:"perception"},
  {id:8, question:"Who in this relationship is more likely to be \"the one that got away\" for someone else?", options:["Me, honestly","My partner","Both of us, we're both catches","Neither. Let's be real."], category:"perception"},
  {id:9, question:"If your partner could go back in time and meet you 5 years earlier, would they have been into you?", options:["100%. We'd have worked at any age.","Probably not, we were different people","They would've liked me, I might not have liked them","We'd have been a disaster"], category:"perception"},
  {id:10, question:"Your partner committed a non-violent crime and got 5 years in prison. Are you waiting?", options:["Without question. I'm visiting every week.","I'd try, but 5 years is a long time","I'd wait a year or two before reassessing","I love them but I'm not doing that"], category:"trust"},
  {id:11, question:"If your friends could say one brutally honest thing about your relationship, what would it be?", options:["'You two are annoyingly perfect together'","'One of you likes the other one more'","'We don't get it but you seem happy'","'We've been waiting for this conversation'"], category:"perception"},
  {id:12, question:"Be honest: is there an ick your partner has that you pretend doesn't bother you?", options:["No, I genuinely accept all of it","There's one small thing I've buried","There are a few things I've learned to ignore","There's one big one I will take to the grave"], category:"perception"},
  {id:13, question:"If you two broke up tomorrow, who recovers faster?", options:["I would","They would","We'd both be a mess for a long time","We'd both be fine within a month"], category:"future"},
  {id:14, question:"Your partner gets a dream job offer in another country. What happens?", options:["I'm going with them, no question","We'd try long distance","I'd want them to go but I'm not moving","This would probably end us"], category:"future"},
  {id:15, question:"Last one. Right now, at this exact moment. Does your partner think this relationship is forever?", options:["Yes. Absolutely. No doubt.","Probably, but they've got a small voice of doubt","I think they hope so but aren't sure","I honestly don't know"], category:"future"},
];

const CATEGORIES = {
  trust: { name:"Trust & Loyalty", questionIds:[1,2,5,6,10],
    readings:{ high:"You agree on the hard stuff. Ride-or-die questions? Same page. That's rarer than you think.", mid:"Close, but there's a gap in what you'd sacrifice. Not a red flag — just a conversation waiting to happen.", low:"You see loyalty differently. One of you might be more all-in than the other realizes." }},
  perception: { name:"How You See Each Other", questionIds:[3,7,8,9,11,12],
    readings:{ high:"You see the same person when you look at each other. Most couples are dating slightly different versions of each other. Not you.", mid:"Close but not identical. The version of your partner in your head might need an update.", low:"You're not seeing the same person — or at least, not the same version. Worth talking about." }},
  future: { name:"The Future", questionIds:[4,13,14,15],
    readings:{ high:"Same road. Same certainty. Same destination. That kind of alignment is the whole point.", mid:"One of you might be a little more sure than the other. Not a dealbreaker — but it is a conversation.", low:"You're looking at different horizons. This is the one to talk about." }}
};

const TIERS = [
  {min:13, name:"Same Brain", color:"#22c55e", verdict:"Disgusting. In the best way. You two are so in sync it's almost annoying. Whatever you're doing, keep doing it — or at least tell the rest of us how."},
  {min:10, name:"Mostly Aligned", color:"#eab308", verdict:"You're not perfect but you're paying attention, and that's the whole thing. The places you didn't match? Those are the conversations you haven't had yet."},
  {min:6, name:"Different Chapters", color:"#f97316", verdict:"Same relationship, different chapters. Not a red flag — just means you've been assuming instead of asking. Now you know where to start."},
  {min:0, name:"Parallel Universes", color:"#ef4444", verdict:"Before you panic: this doesn't mean it's over. You've been filling in the blanks instead of checking. The fact that you're both here? Better sign than the score."},
];

function getTier(n){for(const t of TIERS){if(n>=t.min)return t;}return TIERS[TIERS.length-1];}
function getCatResults(my,theirs){
  const r={};
  for(const[k,c]of Object.entries(CATEGORIES)){
    let m=0; c.questionIds.forEach(id=>{if(my[id]===theirs[id])m++;});
    const t=c.questionIds.length, p=m/t;
    const reading=p>=0.7?c.readings.high:p>=0.4?c.readings.mid:c.readings.low;
    const bar=p>=0.7?'#22c55e':p>=0.4?'#eab308':'#ef4444';
    r[k]={name:c.name,matched:m,total:t,pct:p,reading,barColor:bar};
  } return r;
}
function encodeAnswers(a){let s='';for(let i=1;i<=15;i++)s+=(a[i]??0).toString();return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function decodeAnswers(code){try{let b=code.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';const s=atob(b);if(s.length!==15)return null;const a={};for(let i=0;i<15;i++){const v=parseInt(s[i]);if(isNaN(v)||v<0||v>3)return null;a[i+1]=v;}return a;}catch(e){return null;}}
const SHARE_BASE_URL='https://www.buzzfeed.com/peggy/couples-quiz';
function getShareURL(a){return SHARE_BASE_URL+'?p='+encodeAnswers(a);}
function getPartnerFromURL(){const p=new URLSearchParams(window.location.search).get('p');return p?decodeAnswers(p):null;}

let state={screen:'home',currentQ:0,answers:{},partnerAnswers:null,selectedOption:null};
const partnerFromURL=getPartnerFromURL();
if(partnerFromURL){state.screen='home-b';state.partnerAnswers=partnerFromURL;}

const app=document.getElementById('app');

function render(){
  const s=state; let html='';

  if(s.screen==='home'){
    html=`<div class="screen visible">
      <div class="stat-number">3,000</div>
      <p class="label-upper">people said this quiz</p>
      <h1>ended in divorce.</h1>
      <p class="subtitle">Can your relationship survive this quiz?<br>There's only one way to find out.</p>
      <button class="btn-accent" onclick="startQuizA()">I'll go first</button>
      <div style="height:8px"></div>
      <button class="btn-outline" onclick="goHome()">My partner took this, where's the link?</button>
    </div>`;
  }

  else if(s.screen==='home-b'){
    html=`<div class="screen visible">
      <div class="stat-number">3,000</div>
      <p class="label-upper">people said this quiz</p>
      <h1>ended in divorce.</h1>
      <p class="subtitle">Your partner already took this quiz.<br>Now it's your turn. Same questions, your answers.<br>No peeking.</p>
      <button class="btn-accent" onclick="startQuizB()">Your turn</button>
    </div>`;
  }

  else if(s.screen==='quiz-a'||s.screen==='quiz-b'){
    const q=QUESTIONS[s.currentQ], who=s.screen==='quiz-a'?'Partner A':'Partner B';
    let pips='';for(let i=0;i<QUESTIONS.length;i++){const c=i<s.currentQ?'done':i===s.currentQ?'current':'';pips+=`<div class="progress-pip ${c}"></div>`;}
    let opts='';q.options.forEach((o,i)=>{opts+=`<button class="btn ${s.selectedOption===i?'selected':''}" onclick="selectAnswer(${q.id},${i})">${o}</button>`;});
    const back=s.currentQ>0?`<button class="btn-ghost" onclick="goBack()">← Back</button>`:'';
    html=`<div class="screen visible"><div class="progress-bar">${pips}</div><p class="label-upper">${who} · Question ${s.currentQ+1} of ${QUESTIONS.length}</p><div class="question-text">${q.question}</div><div>${opts}</div>${back}</div>`;
  }

  else if(s.screen==='share'){
    const url=getShareURL(s.answers);
    html=`<div class="screen visible"><div style="font-size:48px;margin-bottom:16px">✓</div><h2>Your answers are locked in.</h2><p class="body-text">Send this special link to your partner. They'll answer the same questions from their own perspective. Neither of you will see what the other said until both are done.</p><div class="share-box"><div class="share-url">${url}</div></div><button class="btn-accent" onclick="copyLink()">Copy link</button><div style="height:8px"></div><button class="btn-ghost" onclick="resetQuiz()">Start over</button></div>`;
  }

  else if(s.screen==='results'){
    const my=s.answers, theirs=s.partnerAnswers;
    let mc=0; const qm=[];
    QUESTIONS.forEach(q=>{const m=my[q.id]===theirs[q.id];if(m)mc++;qm.push(m);});
    const tier=getTier(mc), cats=getCatResults(my,theirs);

    let dots='';qm.forEach(m=>{dots+=`<div class="alignment-dot ${m?'match':'miss'}"></div>`;});
    let cards='';for(const[k,c]of Object.entries(cats)){
      cards+=`<div class="cat-card"><div class="cat-top"><div class="cat-name">${c.name}</div><div class="cat-score" style="color:${c.barColor}">${c.matched}/${c.total}</div></div><div class="cat-bar"><div class="cat-bar-fill" style="width:${Math.max(c.pct*100,8)}%;background:${c.barColor}"></div></div><div class="cat-read">${c.reading}</div></div>`;
    }
    const shareText=`We got ${tier.name} (${mc}/15) on The Couples Quiz. 52% of couples don't pass. 👀`;

    html=`<div class="screen visible results-container">
      <p class="label-upper">Your alignment</p>
      <div class="tier-name" style="color:${tier.color}">${tier.name}</div>
      <div class="tier-score">${mc} of 15 seen the same way</div>
      <div class="alignment-grid">${dots}</div>
      <div class="grid-legend"><div class="grid-legend-item"><div class="grid-legend-dot" style="background:var(--green)"></div> Aligned</div><div class="grid-legend-item"><div class="grid-legend-dot" style="background:rgba(245,240,235,0.08)"></div> Split</div></div>
      <div class="verdict-text">${tier.verdict}</div>
      <div class="results-divider"></div>
      <div class="cat-label">The Breakdown</div>
      ${cards}
      <div class="results-actions">
        <button class="btn-accent" onclick="downloadResults()">Save your results</button>
        <button class="btn-outline" onclick="shareLink()">Share your score</button>
        <button class="btn-ghost" onclick="resetQuiz()">Think you can do better? Take it again →</button>
      </div>
    </div>`;
    window._r={mc,tier,cats,qm,shareText};
  }

  else if(s.screen==='no-link'){
    html=`<div class="screen visible"><h2>You need a link from your partner.</h2><p class="body-text">Your partner goes first, answers 15 questions, and gets a special link to send you. Open that link to take the quiz and see your results together.</p><button class="btn-accent" onclick="startQuizA()">I'll go first instead</button><div style="height:8px"></div><button class="btn-ghost" onclick="goToHome()">← Back</button></div>`;
  }

  app.innerHTML=html;
}

function startQuizA(){state={screen:'quiz-a',currentQ:0,answers:{},partnerAnswers:null,selectedOption:null};try{window.history.replaceState({},'',window.location.pathname);}catch(e){}render();}
function startQuizB(){state.screen='quiz-b';state.currentQ=0;state.answers={};state.selectedOption=null;render();}
function goHome(){if(partnerFromURL){state.screen='home-b';state.partnerAnswers=partnerFromURL;render();}else{state.screen='no-link';render();}}
function goToHome(){state.screen='home';render();}
function goBack(){if(state.currentQ>0){state.currentQ--;state.selectedOption=null;render();}}
function selectAnswer(qid,oi){
  if(state.selectedOption!==null)return;
  state.selectedOption=oi;state.answers[qid]=oi;render();
  setTimeout(()=>{state.selectedOption=null;if(state.currentQ<QUESTIONS.length-1){state.currentQ++;render();}else{if(state.screen==='quiz-a'){state.screen='share';render();}else if(state.screen==='quiz-b'){state.screen='results';try{window.history.replaceState({},'',window.location.pathname);}catch(e){}render();}}},400);
}
async function tryCopy(text){
  try{if(navigator.clipboard&&navigator.clipboard.writeText){await navigator.clipboard.writeText(text);return true;}}catch(e){}
  try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);if(ok)return true;}catch(e){}
  return false;
}
async function copyLink(){
  const url=getShareURL(state.answers);
  try{if(navigator.share){await navigator.share({title:'The Couples Quiz',text:'Can we pass the test? Take the quiz.',url:url});return;}}catch(e){}
  const ok=await tryCopy(url);
  const b=document.querySelector('.btn-accent');
  if(b){b.textContent=ok?'Copied!':'Select the link above and copy';setTimeout(()=>{b.textContent='Copy link';},2500);}
}
function resetQuiz(){state={screen:'home',currentQ:0,answers:{},partnerAnswers:null,selectedOption:null};try{window.history.replaceState({},'',window.location.pathname);}catch(e){}render();}
async function shareLink(){
  const r=window._r;if(!r)return;
  const text=r.shareText+'\n'+SHARE_BASE_URL;
  try{if(navigator.share){await navigator.share({text:text});return;}}catch(e){}
  const ok=await tryCopy(text);
  const b=document.querySelector('.btn-outline');
  if(b){b.textContent=ok?'Copied!':'Long-press the link to copy';setTimeout(()=>{b.textContent='Share your score';},2500);}
}

function downloadResults(){
  const r=window._r;if(!r)return;
  const c=document.getElementById('results-canvas'),x=c.getContext('2d');
  const W=1080,H=1350;c.width=W;c.height=H;
  x.fillStyle='#0a0a0a';x.fillRect(0,0,W,H);
  // noise
  x.globalAlpha=0.03;for(let i=0;i<5000;i++){x.fillStyle=Math.random()>0.5?'#fff':'#000';x.fillRect(Math.random()*W,Math.random()*H,1,1);}x.globalAlpha=1;
  // header
  x.fillStyle='#6b6560';x.font='600 22px sans-serif';x.textAlign='center';
  x.fillText('T H E   C O U P L E S   Q U I Z',W/2,100);
  // tier
  x.fillStyle=r.tier.color;x.font='italic 900 76px Georgia,serif';x.fillText(r.tier.name,W/2,200);
  // score
  x.fillStyle='#6b6560';x.font='400 26px sans-serif';x.fillText(r.mc+' of 15 aligned',W/2,248);
  // grid
  const ds=40,dg=8,tw=15*ds+14*dg,gx=(W-tw)/2,gy=290;
  r.qm.forEach((m,i)=>{x.fillStyle=m?'#22c55e':'rgba(245,240,235,0.06)';rr(x,gx+i*(ds+dg),gy,ds,ds,5);x.fill();});
  // divider
  x.fillStyle='rgba(245,240,235,0.12)';x.fillRect(W/2-24,370,48,1);
  // cats
  let cy=410;const px=80,cw=W-px*2;
  for(const[k,cr]of Object.entries(r.cats)){
    x.fillStyle='#141414';rr(x,px,cy,cw,160,14);x.fill();
    x.fillStyle='#f5f0eb';x.font='italic 700 26px Georgia,serif';x.textAlign='left';x.fillText(cr.name,px+24,cy+36);
    x.fillStyle=cr.barColor;x.font='700 22px sans-serif';x.textAlign='right';x.fillText(cr.matched+'/'+cr.total,px+cw-24,cy+36);
    x.fillStyle='rgba(245,240,235,0.05)';rr(x,px+24,cy+52,cw-48,5,3);x.fill();
    x.fillStyle=cr.barColor;rr(x,px+24,cy+52,Math.max((cw-48)*cr.pct,8),5,3);x.fill();
    x.fillStyle='#6b6560';x.font='400 21px sans-serif';x.textAlign='left';wt(x,cr.reading,px+24,cy+88,cw-48,28);
    cy+=180;
  }
  // footer
  x.fillStyle='#6b6560';x.font='400 20px sans-serif';x.textAlign='center';x.fillText('www.buzzfeed.com/peggy/couples-quiz',W/2,H-50);
  // dl
  c.toBlob(b=>{const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='couples-quiz-'+r.tier.name.toLowerCase().replace(/\s+/g,'-')+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);},'image/png');
  const btn=document.querySelector('.btn-accent');if(btn){btn.textContent='Saved!';setTimeout(()=>{btn.textContent='Save your results';},2000);}
}
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.lineTo(a+w-r,b);x.quadraticCurveTo(a+w,b,a+w,b+r);x.lineTo(a+w,b+h-r);x.quadraticCurveTo(a+w,b+h,a+w-r,b+h);x.lineTo(a+r,b+h);x.quadraticCurveTo(a,b+h,a,b+h-r);x.lineTo(a,b+r);x.quadraticCurveTo(a,b,a+r,b);x.closePath();}
function wt(x,t,a,b,mw,lh){const w=t.split(' ');let l='';for(let i=0;i<w.length;i++){const tl=l+w[i]+' ';if(x.measureText(tl).width>mw&&i>0){x.fillText(l.trim(),a,b);l=w[i]+' ';b+=lh;}else l=tl;}x.fillText(l.trim(),a,b);}

render();
function postHeight(){window.parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*');}
const _orig=render;render=function(){_orig();requestAnimationFrame(()=>setTimeout(postHeight,50));};
window.addEventListener('load',()=>setTimeout(postHeight,100));
new ResizeObserver(()=>postHeight()).observe(document.body);
render();
</script>
